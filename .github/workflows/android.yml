name: Android CI (Compile and Build APK)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.12'

      - name: Restore Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
            echo "Successfully restored debug.keystore from base64 representation."
          else
            echo "debug.keystore.base64 file not found. Falling back to default generation if needed."
          fi

      - name: Build Debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Keymapper-App-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
