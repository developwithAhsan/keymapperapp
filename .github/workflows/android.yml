name: Android CI (Compile and Build APK)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Restore or Generate Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ] && [ -s "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
            echo "Successfully restored debug.keystore from base64 representation."
          else
            echo "debug.keystore.base64 file not found or empty. Generating a fresh debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Fix line endings and make gradlew executable
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Keymapper-App-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
